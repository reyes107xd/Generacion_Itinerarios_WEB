services:
  # ------------------------------------
  # 1. SERVICIO BACKEND (Node.js)
  # ------------------------------------
  - type: web
    name: proyectoads-backend
    env: node
    plan: starter          # En YAML, 'starter' es el nombre del plan gratuito para web services
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.10.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
    autoDeploy: true

  # ------------------------------------
  # 2. SERVICIO FRONTEND (React/Vite)
  # ------------------------------------
  - type: web
    name: proyectoads-frontend
    env: static            # Al ser 'static', Render entiende que es gratuito
    rootDir: front
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
